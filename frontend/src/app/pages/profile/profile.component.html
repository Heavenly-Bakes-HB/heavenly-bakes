<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-3">My Profile</h3>
          <div *ngIf="user; else guest">
            <p><strong>Name:</strong> {{ user.name || user.first_name || 'Customer' }}</p>
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Role:</strong> {{ user.role || 'User' }}</p>
            <a class="btn btn-outline-danger" routerLink="/orders">View Orders</a>
          </div>
          <ng-template #guest>
            <p class="text-muted">Please log in to view your profile.</p>
            <a class="btn btn-danger" routerLink="/login">Login</a>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
