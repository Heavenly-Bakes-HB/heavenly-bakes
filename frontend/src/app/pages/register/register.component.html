<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">Create Account</h3>

          <div *ngIf="message" class="alert" [ngClass]="isError ? 'alert-danger' : 'alert-success'">
            {{ message }}
          </div>

          <div class="mb-3">
            <label>Name</label>
            <input class="form-control" [(ngModel)]="name" />
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input class="form-control" type="email" [(ngModel)]="email" />
          </div>

          <div class="mb-3">
            <label>Password</label>
            <input class="form-control" type="password" [(ngModel)]="password" />
          </div>

          <button class="btn btn-danger w-100" (click)="register()">Register</button>
        </div>
      </div>
    </div>
  </div>
</div>
