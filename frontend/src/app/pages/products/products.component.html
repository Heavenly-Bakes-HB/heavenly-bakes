<div class="container mt-4">

    <div #toastAnchor class="position-sticky top-0 z-3 py-2 bg-white">
        <div *ngIf="message" class="alert d-flex justify-content-between align-items-center mb-0" [ngClass]="isError ? 'alert-danger' : 'alert-success'" role="alert">
            <span>{{ message }}</span>
            <a *ngIf="showViewCartLink" class="btn btn-sm btn-outline-light" routerLink="/cart">View Cart</a>
        </div>
    </div>

    <div class="row">

        <div
            class="col-md-4 mb-4"
            *ngFor="let product of products">

            <div class="card h-100">

                <img
                    [src]="getProductImage(product)"
                    [alt]="product.name"
                    class="card-img-top"
                    height="250">

                <div class="card-body">

                    <h5>{{product.name}}</h5>

                    <p>

                        ₹ {{product.price}}

                    </p>

<button
    class="btn btn-success w-100"
    (click)="addToCart(product)">
    Add To Cart
</button>

                </div>

            </div>

        </div>

    </div>

</div>
