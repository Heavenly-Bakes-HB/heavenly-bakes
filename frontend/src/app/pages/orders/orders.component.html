<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2>My Orders</h2>
      <p class="text-muted">Review your order history and open order details for delivery status.</p>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered align-middle">
      <thead>
        <tr>
          <th>Order Id</th>
          <th>Total</th>
          <th>Status</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders">
          <td>{{order.id}}</td>
          <td>₹ {{order.total_amount}}</td>
          <td>{{order.status}}</td>
          <td>{{order.created_at | date:'medium'}}</td>
          <td><a class="btn btn-sm btn-outline-primary" [routerLink]="['/orders', order.id]">Details</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
